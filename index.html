<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TPV</title>
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',Roboto,sans-serif;background:#0f172a;color:#1e293b;font-size:13px;-webkit-text-size-adjust:100%;position:fixed;top:0;left:0}
input,select,textarea{user-select:text;-webkit-user-select:text;font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
#app{display:flex;height:100%;width:100%;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}

/* ===== SIDEBAR ===== */
.sidebar{width:62px;background:linear-gradient(180deg,#0f172a,#1e293b);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:1px;flex-shrink:0;z-index:10}
.sidebar .logo{font-size:16px;font-weight:800;color:#818cf8;margin:2px 0 2px;letter-spacing:-1px}
.sidebar-clock{font-size:9px;color:#94a3b8;text-align:center;margin-bottom:4px;line-height:1.3;font-weight:600}
.sidebar-clock .clock-time{font-size:14px;color:#e0e7ff;font-weight:800;letter-spacing:.5px}
.sidebar-clock .clock-date{font-size:8px;color:#64748b;margin-top:1px}
.nav-btn{width:54px;padding:7px 0;border:none;background:transparent;color:#94a3b8;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:600;transition:.2s}
.nav-btn .icon{font-size:18px}
.nav-btn.active{background:#334155;color:#818cf8}
.nav-btn:active{transform:scale(.93)}

/* ===== DAY BANNER ===== */
.day-changed-banner{position:fixed;top:0;left:62px;right:0;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;padding:8px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;z-index:100;box-shadow:0 4px 20px rgba(99,102,241,.4);animation:slideDown .4s}
.day-changed-banner button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:6px;font-weight:700;font-size:11px;cursor:pointer}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* ===== TOAST ===== */
.toast-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:10px 18px;border-radius:10px;font-size:12px;font-weight:700;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:toastIn .3s ease;pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap}
.toast.success{background:#10b981}
.toast.error{background:#ef4444}
.toast.info{background:#6366f1}
.toast.warning{background:#f59e0b;color:#1e293b}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(20px)}}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#f0f2f5}
.view{flex:1;display:none;overflow:hidden}
.view.active{display:flex}

/* ===== HORIZONTAL PANEL LAYOUT ===== */
.panel-h{flex:1;display:flex;height:100%;overflow:hidden;background:#f0f2f5}
.panel-left{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px 32px;min-width:0;overflow:hidden}
.panel-left-inner{width:100%;max-width:460px}
.panel-right{width:250px;display:flex;flex-direction:column;justify-content:center;padding:20px 16px;background:#fff;border-left:2px solid #e2e8f0;flex-shrink:0}
.panel-center{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.panel-center-inner{text-align:center;width:100%;max-width:500px}

/* ===== TPV ===== */
.tpv{display:flex;height:100%;flex:1}
.tpv-left{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.cat-bar{display:flex;gap:4px;padding:6px 8px;background:#fff;border-bottom:1px solid #e2e8f0;overflow-x:auto;flex-shrink:0}
.cat-btn{padding:5px 12px;border:2px solid #e2e8f0;background:#fff;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-btn.active{color:#fff;border-color:transparent}
.cat-btn:active{transform:scale(.95)}
.prod-area{flex:1;overflow-y:auto;padding:8px}
.sub-header{display:flex;align-items:center;gap:6px;padding:4px 0;margin:8px 0 6px;border-bottom:2px solid #e2e8f0;font-size:11px;font-weight:700;color:#64748b}
.sub-header:first-child{margin-top:0}
.sub-header .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sub-header .cnt{margin-left:auto;font-size:10px;color:#94a3b8;font-weight:500}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-bottom:6px}
.prod-card{background:#fff;border:2px solid #e2e8f0;border-radius:10px;padding:8px 6px;cursor:pointer;transition:.2s;position:relative;text-align:center;display:flex;flex-direction:column;justify-content:center;min-height:60px}
.prod-card:active{transform:scale(.95)}
/* Mejora 14: animación badge al agregar */
.prod-card .pname{font-size:11px;font-weight:600;margin-bottom:2px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.prod-card .pprice{font-size:13px;font-weight:800;color:#6366f1}
.prod-card .badge{position:absolute;top:-5px;right:-5px;width:20px;height:20px;background:#ef4444;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.prod-card .badge.bump{animation:badgeBump .2s ease}
@keyframes badgeBump{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}

/* ===== CART ===== */
.cart{width:240px;background:#fff;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
.cart-header{padding:8px 10px;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.cart-header .clear{font-size:10px;color:#ef4444;cursor:pointer;font-weight:600;padding:3px 8px;border:1px solid #fecaca;border-radius:6px;background:#fff}
.cart-items{flex:1;overflow-y:auto;padding:4px 6px}
.cart-item{display:flex;align-items:center;gap:4px;padding:5px 4px;border-bottom:1px solid #f1f5f9;font-size:11px}
.cart-item .ci-info{flex:1;min-width:0}
.cart-item .ci-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.cart-item .ci-price{color:#64748b;font-size:9px}
.cart-item .ci-total{font-weight:700;color:#6366f1;white-space:nowrap;padding:0 2px;font-size:11px}
.qty-ctrl{display:flex;align-items:center;gap:0;flex-shrink:0}
.qty-ctrl button{width:24px;height:24px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-ctrl span{width:20px;text-align:center;font-weight:700;font-size:11px}
.ci-del{background:none;border:none;color:#ef4444;font-size:14px;cursor:pointer;padding:2px}
.cart-footer{padding:8px 10px;border-top:1px solid #e2e8f0}
.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;margin-bottom:4px}
.cart-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:12px;flex-direction:column;gap:6px}
.cart-empty .icon{font-size:30px}

/* Mejora 2: Descuentos en carrito */
.discount-row{display:flex;align-items:center;gap:4px;padding:4px 0;border-top:1px dashed #e2e8f0;margin-top:2px}
.discount-row .disc-label{font-size:10px;color:#f59e0b;font-weight:700;flex:1}
.discount-row .disc-val{font-size:12px;font-weight:800;color:#f59e0b}
.disc-bar{display:flex;gap:4px;margin-bottom:6px}
.disc-btn{flex:1;padding:4px 2px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:.2s}
.disc-btn.active{border-color:#f59e0b;background:#fffbeb;color:#92400e}
.disc-input{width:100%;padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-weight:700;text-align:center;background:#fff;margin-bottom:4px}
.disc-input:focus{outline:none;border-color:#f59e0b}

/* ===== BUTTONS ===== */
.btn{padding:8px 14px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;text-align:center;width:100%}
.btn:active{transform:scale(.97)}
.btn-primary{background:#6366f1;color:#fff}
.btn-success{background:#10b981;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-outline{background:#fff;border:2px solid #e2e8f0;color:#1e293b}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-lg{padding:12px 20px;font-size:15px}
.btn:disabled{opacity:.4;pointer-events:none}

/* ===== NUMPAD ===== */
.numpad-display{background:#f1f5f9;border-radius:10px;padding:10px;text-align:right;font-size:24px;font-weight:800;margin-bottom:8px;min-height:44px;display:flex;align-items:center;justify-content:flex-end;color:#1e293b;border:2px solid transparent;transition:.2s}
.numpad-display.active-field{border-color:#6366f1;background:#eef2ff}
.numpad-display .nd-label{font-size:10px;color:#94a3b8;font-weight:600;margin-right:auto;text-transform:uppercase}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.numpad button{padding:14px 8px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:.1s}
.numpad button:active{background:#6366f1;color:#fff;transform:scale(.95)}
.numpad .key-clear{grid-column:1/-1;background:#fef2f2;color:#ef4444;font-size:12px;font-weight:700;padding:8px;border:1px solid #fecaca}
.numpad .key-clear:active{background:#ef4444;color:#fff}
.quick-amounts{display:flex;gap:4px;flex-wrap:wrap}
.quick-btn{flex:1;min-width:50px;padding:6px 4px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:.2s}
.quick-btn:active{transform:scale(.95);border-color:#6366f1}

/* ===== SECTION TITLES ===== */
.section-title{font-size:18px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:#1e293b}
.section-title .st-icon{font-size:22px}

/* ===== FORM ===== */
.form-label{font-size:10px;font-weight:700;color:#64748b;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:8px 10px;border:2px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;margin-bottom:8px;font-family:inherit}
.form-input:focus{outline:none;border-color:#6366f1}

/* ===== PAY METHOD ===== */
.pay-methods{display:flex;gap:8px;margin-bottom:10px}
.pay-method{flex:1;padding:12px;border:2px solid #e2e8f0;border-radius:12px;text-align:center;cursor:pointer;font-weight:700;font-size:13px;transition:.2s;background:#fff}
.pay-method.active{border-color:#6366f1;background:#eef2ff;color:#6366f1}
.pay-method:active{transform:scale(.96)}

/* ===== MIXED PAYMENT (Mejora 5) ===== */
.mixed-pay-section{background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:10px;border:2px solid #e2e8f0}
.mixed-pay-section .mp-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.mixed-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mixed-row .mr-icon{font-size:18px;flex-shrink:0}
.mixed-row .mr-label{font-size:11px;font-weight:600;width:55px;flex-shrink:0}
.mixed-row input{flex:1;padding:6px 8px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-weight:700;text-align:right;background:#fff;min-width:0}
.mixed-row input:focus{outline:none;border-color:#6366f1}
.mixed-summary{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #e2e8f0;margin-top:4px;font-size:11px;font-weight:700}
.mixed-summary .ms-ok{color:#10b981}.mixed-summary .ms-err{color:#ef4444}

/* ===== TOTAL BADGE ===== */
.total-badge{text-align:center;padding:12px;background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-radius:12px;margin-bottom:12px}
.total-badge .tb-label{font-size:10px;color:#6366f1;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.total-badge .tb-amount{font-size:30px;font-weight:800;color:#4338ca}
.total-badge .tb-desc{font-size:10px;color:#64748b;margin-top:2px}

/* ===== STEP INDICATOR ===== */
.step-indicator{display:flex;align-items:center;gap:6px;margin-bottom:14px}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:#e2e8f0;color:#94a3b8}
.step-dot.active{background:#6366f1;color:#fff}
.step-dot.done{background:#10b981;color:#fff}
.step-line{flex:0 0 30px;height:2px;background:#e2e8f0}
.step-line.done{background:#10b981}

/* ===== CHANGE / SUCCESS ===== */
.change-check{font-size:48px;margin-bottom:6px;animation:pop .4s}
.change-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;font-weight:700}
.change-amount{font-size:36px;font-weight:800;color:#10b981;margin:4px 0 12px}
.change-detail{display:flex;justify-content:center;gap:24px;margin-bottom:10px;font-size:13px;color:#64748b}
.change-detail b{color:#1e293b}
.bills-area{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:10px 8px;background:#f8fafc;border-radius:12px;max-height:130px;overflow-y:auto}
.bill{width:84px;height:40px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.bill::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 8px,rgba(255,255,255,.06) 8px,rgba(255,255,255,.06) 9px)}
.bill::after{content:'';position:absolute;top:2px;left:2px;right:2px;bottom:2px;border:1px dashed rgba(255,255,255,.25);border-radius:3px}
.bill-1000{background:linear-gradient(135deg,#4338ca,#6366f1)}
.bill-500{background:linear-gradient(135deg,#92400e,#b45309)}
.bill-200{background:linear-gradient(135deg,#166534,#16a34a)}
.bill-100{background:linear-gradient(135deg,#991b1b,#dc2626)}
.bill-50{background:linear-gradient(135deg,#9d174d,#db2777)}
.bill-20{background:linear-gradient(135deg,#1e40af,#2563eb)}
.coin{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.coin-10{background:linear-gradient(135deg,#fbbf24,#d97706);border:3px solid #92400e;color:#78350f}
.coin-5{background:linear-gradient(135deg,#e5e7eb,#9ca3af);border:3px solid #6b7280;color:#374151}
.coin-2{background:linear-gradient(135deg,#d1d5db,#9ca3af);border:3px solid #6b7280;color:#374151}
.coin-1{background:linear-gradient(135deg,#fde68a,#d97706);border:3px solid #92400e;color:#78350f}
.coin-050{background:linear-gradient(135deg,#d1d5db,#6b7280);border:2px solid #4b5563;color:#1f2937;width:30px;height:30px;font-size:9px}
.bill-label{position:relative;z-index:1;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.bill-count{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;width:16px;height:16px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.denomination{position:relative;display:inline-flex}

/* ===== WITHDRAWAL ===== */
.reason-grid{display:flex;gap:8px;margin-bottom:12px}
.reason-btn{flex:1;padding:14px 8px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;text-align:center;cursor:pointer;transition:.2s}
.reason-btn .r-icon{font-size:28px;margin-bottom:2px}
.reason-btn .r-label{font-size:11px;font-weight:700}
.reason-btn.active{border-color:#f59e0b;background:#fffbeb}
.reason-btn:active{transform:scale(.95)}

/* ===== CHANGE PREVIEW ===== */
.change-preview{text-align:center;padding:6px;font-size:14px;font-weight:800;color:#f59e0b;background:#fffbeb;border-radius:8px;margin-top:8px;margin-bottom:8px}

/* ===== DATABASE ===== */
.db-view{display:flex;flex-direction:column;height:100%}
.db-tabs{display:flex;gap:3px;padding:6px 8px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.db-tab{padding:6px 14px;border:none;background:transparent;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;color:#64748b;transition:.2s}
.db-tab.active{background:#6366f1;color:#fff}
.db-content{flex:1;overflow-y:auto;padding:10px}
.db-form{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid #e2e8f0}
.db-form-title{font-size:12px;font-weight:700;margin-bottom:8px;color:#6366f1}
.db-form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.db-form-row .field{flex:1;min-width:100px}
.color-grid{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.color-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:.2s}
.color-opt.active{border-color:#1e293b;transform:scale(1.1)}
.color-opt:active{transform:scale(.9)}
.db-list{display:flex;flex-direction:column;gap:4px}
.db-item{display:flex;align-items:center;padding:8px 10px;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);border:1px solid #e2e8f0;gap:8px;font-size:12px}
.db-item .di-color{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.db-item .di-name{flex:1;font-weight:600}
.db-item .di-meta{color:#64748b;font-size:10px}
.db-item .di-actions{display:flex;gap:3px}
.db-item .di-actions button{padding:4px 8px;border:1px solid #e2e8f0;background:#fff;border-radius:6px;font-size:10px;cursor:pointer;font-weight:600}
.db-item .di-actions .edit{color:#6366f1}
.db-item .di-actions .del{color:#ef4444}
.db-item .di-actions button:active{transform:scale(.93)}
.db-numpad-wrap{background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:10px}
.db-numpad-display{background:#fff;border:2px solid #e2e8f0;border-radius:8px;padding:8px;text-align:right;font-size:20px;font-weight:800;margin-bottom:6px}
.db-numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.db-numpad button{padding:8px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:14px;font-weight:700;cursor:pointer}
.db-numpad button:active{background:#6366f1;color:#fff}
.db-numpad .key-c{color:#ef4444}

/* ===== CSV BAR ===== */
.csv-bar{display:flex;gap:4px;padding:6px 8px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-shrink:0;align-items:center;flex-wrap:wrap}
.csv-bar .csv-title{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-right:auto}
.csv-btn{padding:5px 10px;border:2px solid #e2e8f0;background:#fff;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:3px;transition:.2s;color:#1e293b}
.csv-btn:active{transform:scale(.95)}
.csv-btn.import-btn{border-color:#10b981;color:#10b981;background:#f0fdf4}
.csv-btn.export-btn{border-color:#3b82f6;color:#3b82f6;background:#eff6ff}
.csv-btn.template-btn{border-color:#f59e0b;color:#92400e;background:#fffbeb}
.csv-btn.clear-btn{border-color:#ef4444;color:#ef4444;background:#fef2f2}

/* ===== REPORTS ===== */
.rpt-view{display:flex;flex-direction:column;height:100%}
.rpt-header{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap}

<div class="toast-container" id="toast-container"></div>
<input type="file" id="csv-file-input" accept=".csv,.txt" style="display:none">

<script>
// ============================================================
// MÓDULO: UTILIDADES
// ============================================================
function todayStr(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function timeStr(){var d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());}
function pad(n){return String(n).padStart(2,'0');}
function fmt(n){return '$'+Number(n||0).toFixed(2);}
function nextId(arr){return arr.length?Math.max.apply(null,arr.map(function(i){return i.id;}))+1:1;}
function dateAdd(str,days){var d=new Date(str+'T12:00:00');d.setDate(d.getDate()+days);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function dateName(str){
  var d=new Date(str+'T12:00:00');
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return dias[d.getDay()]+' '+d.getDate()+' '+meses[d.getMonth()]+' '+d.getFullYear();
}
// Bugfix #6: pctChange devuelve null si ambos son 0
function pctChange(cur,prev){
  if(!prev&&!cur)return null;
  if(!prev)return 100;
  return((cur-prev)/prev*100);
}
function pctLabel(pct){
  if(pct===null)return '<span class="kpi-neutral">—</span>';
  return '<span class="'+(pct>=0?'kpi-up':'kpi-down')+'">'+(pct>=0?'▲':'▼')+' '+Math.abs(pct).toFixed(1)+'%</span>';
}
function getCartBaseTotal(){return S.cart.reduce(function(s,i){return s+i.price*i.qty;},0);}
function getDiscount(){
  var base=getCartBaseTotal();
  if(S.discountType==='pct'){var v=parseFloat(S.discountValue)||0;return Math.min(base,base*v/100);}
  if(S.discountType==='amt'){var v=parseFloat(S.discountValue)||0;return Math.min(base,v);}
  return 0;
}
function getCartTotal(){return Math.max(0,getCartBaseTotal()-getDiscount());}
function getCartCount(){return S.cart.reduce(function(s,i){return s+i.qty;},0);}
function getChangeBreakdown(amount){
  var denoms=[1000,500,200,100,50,20,10,5,2,1,0.5];
  var res=[];var rem=Math.round(amount*100)/100;
  for(var di=0;di<denoms.length;di++){var dd=denoms[di];var count=Math.floor(Math.round(rem/dd*100)/100);if(count>0){res.push({value:dd,count:count,isBill:dd>=20});rem=Math.round((rem-dd*count)*100)/100;}}
  return res;
}
function getWeekDays(dateStr){
  var date=new Date(dateStr+'T12:00:00');var day=date.getDay();
  var mon=new Date(date);mon.setDate(date.getDate()-(day===0?6:day-1));
  var days=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));}
  return days;
}
function getMonthDays(dateStr){
  var d=new Date(dateStr+'T12:00:00');
  var year=d.getFullYear();var month=d.getMonth();
  var first=new Date(year,month,1);var last=new Date(year,month+1,0);
  var days=[];var cur=new Date(first);
  while(cur<=last){days.push(cur.getFullYear()+'-'+pad(cur.getMonth()+1)+'-'+pad(cur.getDate()));cur.setDate(cur.getDate()+1);}
  return days;
}
function escHTML(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============================================================
// MÓDULO: TOAST (Mejora 12)
// ============================================================
var toastTimers=[];
function toast(msg,type,duration){
  type=type||'info';duration=duration||2500;
  var tc=document.getElementById('toast-container');if(!tc)return;
  var el=document.createElement('div');
  el.className='toast '+type;
  el.innerHTML=msg;
  tc.appendChild(el);
  var t=setTimeout(function(){
    el.classList.add('out');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},300);
  },duration);
  toastTimers.push(t);
}

// ============================================================
// MÓDULO: ESTADO
// ============================================================
var currentDay=todayStr();
var showDayChangeBanner=false;
var S={
  view:'tpv',
  tpvMode:'browse',selCat:'all',payMethod:'cash',numpad:'',
  manMode:'input',manStep:1,manNumpad:'',manPaid:'',manDesc:'',manMethod:'cash',
  wdMode:'input',wdReason:'basura',wdNumpad:'',
  dbTab:'categories',dbEditing:null,dbFormName:'',dbFormColor:'#ef4444',
  dbFormCatId:'',dbFormSubId:'',dbPriceNumpad:'',
  rptDate:todayStr(),rptRange:'day',
  cart:[],
  // Mejora 2: descuentos
  discountType:'none',discountValue:'',
  // Mejora 5: pago mixto
  mixedCash:'',mixedCard:'',
  // Bugfix #3: snapshot de totales al confirmar
  confirmedTotal:0,confirmedPaid:0,confirmedChange:0,confirmedMethod:'cash',
};

// ============================================================
// MÓDULO: DATOS
// ============================================================
var cats=[],subs=[],prods=[],txns=[];
var COLORS=['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#6b7280','#78716c'];
var LS_KEYS={cats:'tpv_cats',subs:'tpv_subs',prods:'tpv_prods',txns:'tpv_txns'};

// Mejora 20: limpieza de transacciones antiguas (> 90 días)
function pruneOldTxns(){
  var cutoff=dateAdd(todayStr(),-90);
  var before=txns.length;
  txns=txns.filter(function(t){return t.date>=cutoff;});
  if(txns.length<before){
    console.log('TPV: purgadas '+(before-txns.length)+' transacciones antiguas (>90 días)');
  }
}

function save(){
  try{
    localStorage.setItem(LS_KEYS.cats,JSON.stringify(cats));
    localStorage.setItem(LS_KEYS.subs,JSON.stringify(subs));
    localStorage.setItem(LS_KEYS.prods,JSON.stringify(prods));
    localStorage.setItem(LS_KEYS.txns,JSON.stringify(txns));
  }catch(e){
    // Mejora 20: si localStorage está lleno, purgar y reintentar
    pruneOldTxns();
    try{localStorage.setItem(LS_KEYS.txns,JSON.stringify(txns));}catch(e2){
      toast('⚠️ Almacenamiento lleno. Exporta transacciones antiguas.','warning',5000);
    }
  }
}
function load(){
  try{cats=JSON.parse(localStorage.getItem(LS_KEYS.cats))||[];}catch(e){cats=[];}
  try{subs=JSON.parse(localStorage.getItem(LS_KEYS.subs))||[];}catch(e){subs=[];}
  try{prods=JSON.parse(localStorage.getItem(LS_KEYS.prods))||[];}catch(e){prods=[];}
  try{txns=JSON.parse(localStorage.getItem(LS_KEYS.txns))||[];}catch(e){txns=[];}
}
function seed(){
  cats=[{id:1,name:'Bebidas',color:'#3b82f6'},{id:2,name:'Comida',color:'#ef4444'},{id:3,name:'Postres',color:'#ec4899'},{id:4,name:'Snacks',color:'#f97316'}];
  subs=[
    {id:1,name:'Calientes',catId:1},{id:2,name:'Frías',catId:1},
    {id:3,name:'Platillos',catId:2},{id:4,name:'Antojitos',catId:2},
    {id:5,name:'Pasteles',catId:3},{id:6,name:'Helados',catId:3},
    {id:7,name:'Dulces',catId:4},{id:8,name:'Salados',catId:4}
  ];
  prods=[
    {id:1,name:'Café Americano',price:45,catId:1,subId:1},{id:2,name:'Cappuccino',price:55,catId:1,subId:1},
    {id:3,name:'Latte',price:60,catId:1,subId:1},{id:4,name:'Té Verde',price:40,catId:1,subId:1},
    {id:5,name:'Agua Natural',price:20,catId:1,subId:2},{id:6,name:'Limonada',price:35,catId:1,subId:2},
    {id:7,name:'Jugo Naranja',price:40,catId:1,subId:2},{id:8,name:'Refresco',price:25,catId:1,subId:2},
    {id:9,name:'Hamburguesa',price:89,catId:2,subId:3},{id:10,name:'Ensalada',price:75,catId:2,subId:3},
    {id:11,name:'Torta Jamón',price:65,catId:2,subId:4},{id:12,name:'Quesadilla',price:45,catId:2,subId:4},
    {id:13,name:'Tacos (3)',price:55,catId:2,subId:4},
    {id:14,name:'Pastel Choco',price:50,catId:3,subId:5},{id:15,name:'Cheesecake',price:55,catId:3,subId:5},
    {id:16,name:'Helado Vainilla',price:35,catId:3,subId:6},{id:17,name:'Helado Choco',price:35,catId:3,subId:6},
    {id:18,name:'Chocolate',price:25,catId:4,subId:7},{id:19,name:'Gomitas',price:15,catId:4,subId:7},
    {id:20,name:'Papas Fritas',price:30,catId:4,subId:8},{id:21,name:'Cacahuates',price:20,catId:4,subId:8}
  ];
  save();
}

// ============================================================
// MÓDULO: NUMPAD
// ============================================================
function numpadPress(target,key){
  var v=S[target]||'';
  if(key==='C'){v='';}
  else if(key==='back'){v=v.slice(0,-1);}
  else if(key==='.'){if(!v.includes('.')){v+=v?'.':'0.';}}
  else{
    if(v==='0'&&key!=='0'){v=key;}
    else if(v==='0'&&key==='0'){return;}
    else{v+=key;}
    var p=v.split('.');if(p[1]&&p[1].length>2)return;
  }
  S[target]=v;
  // Mejora 17: patch DOM parcial en lugar de render completo
  patchNumpadDisplay(target,v);
}

// Mejora 17: actualiza solo el display y los elementos que dependen del valor
function patchNumpadDisplay(target,v){
  // Actualiza displays
  var disp=document.querySelector('[data-numpad-display="'+target+'"]');
  if(disp){var label=disp.querySelector('.nd-label');disp.innerHTML=(label?label.outerHTML:'')+'$'+(v||'0');}
  var dbDisp=document.querySelector('[data-db-numpad-display]');
  if(target==='dbPriceNumpad'&&dbDisp)dbDisp.textContent=v?'$'+v:'$0';
  // Actualiza preview de cambio y botón de cobrar si aplica
  updatePayPreview();
}

function updatePayPreview(){
  // Preview de cambio en TPV pay (efectivo)
  var cpEl=document.getElementById('change-preview-el');
  var payBtn=document.getElementById('confirm-pay-btn');
  if(cpEl||payBtn){
    var total=S.confirmedTotal||getCartTotal();
    var numVal=parseFloat(S.numpad)||0;
    var changeAmt=numVal>total?numVal-total:0;
    if(cpEl){
      if(changeAmt>0){cpEl.style.display='block';cpEl.textContent='Cambio: '+fmt(changeAmt);}
      else{cpEl.style.display='none';}
    }
    if(payBtn){
      var canPay=numVal>=total;
      payBtn.disabled=!canPay;
      payBtn.textContent='Cobrar '+(numVal>=total?fmt(numVal):'');
    }
  }
  // Preview en manual step2
  var manCpEl=document.getElementById('man-change-preview');
  var manBtn=document.getElementById('man-confirm-btn');
  if(manCpEl||manBtn){
    var mt=parseFloat(S.manNumpad)||0;
    var mp=parseFloat(S.manPaid)||0;
    var mc=mp>mt?mp-mt:0;
    if(manCpEl){if(mc>0){manCpEl.style.display='block';manCpEl.textContent='Cambio: '+fmt(mc);}else{manCpEl.style.display='none';}}
    if(manBtn){manBtn.disabled=mp<mt||mt<=0;manBtn.textContent='Cobrar '+fmt(mt);}
  }
}

function renderNumpad(target){
  return '<div class="numpad">'+
    ['1','2','3','4','5','6','7','8','9','.','0','back'].map(function(k){
      if(k==='back')return '<button data-action="numpad" data-target="'+target+'" data-value="back">⌫</button>';
      return '<button data-action="numpad" data-target="'+target+'" data-value="'+k+'">'+k+'</button>';
    }).join('')+
    '<button class="key-clear" data-action="numpad" data-target="'+target+'" data-value="C">Borrar</button>'+
  '</div>';
}

// ============================================================
// MÓDULO: PRESERVAR INPUTS (Mejora 18: debounce)
// ============================================================
var _preserveTimer=null;
function preserveInputs(){
  // Lee inmediatamente (sin debounce) para no perder nada
  var el1=document.getElementById('man-desc');if(el1)S.manDesc=el1.value;
  var el2=document.getElementById('db-name');if(el2)S.dbFormName=el2.value;
  var el3=document.getElementById('disc-input');if(el3)S.discountValue=el3.value;
  var el4=document.getElementById('mixed-cash-input');if(el4)S.mixedCash=el4.value;
  var el5=document.getElementById('mixed-card-input');if(el5)S.mixedCard=el5.value;
}

// ============================================================
// MÓDULO: CSV
// ============================================================
var csvResult=null;
function parseCSV(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2)return{error:'El archivo CSV está vacío o no tiene datos.'};
  var sep=lines[0].includes(';')?';':',';
  var header=lines[0].split(sep).map(function(h){return h.trim().toLowerCase().replace(/['"]/g,'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');});
  var colMap={categoria:-1,color_categoria:-1,subcategoria:-1,nombre_producto:-1,precio:-1};
  Object.keys(colMap).forEach(function(c){
    var idx=header.findIndex(function(h){var hn=h.replace(/[_\s]/g,'');var cn=c.replace(/[_\s]/g,'');return hn===cn||hn.includes(cn);});
    colMap[c]=idx;
  });
  if(colMap['categoria']===-1||colMap['nombre_producto']===-1||colMap['precio']===-1){return{error:'Faltan columnas: categoria, nombre_producto, precio.'};}
  var rows=[];
  for(var i=1;i<lines.length;i++){
    // Bugfix: parser CSV con soporte de comillas para comas dentro de campos
    var vals=splitCSVLine(lines[i],sep);
    if(vals.length<3)continue;
    var row={
      categoria:vals[colMap['categoria']]||'',
      color_categoria:colMap['color_categoria']>-1?(vals[colMap['color_categoria']]||''):'',
      subcategoria:colMap['subcategoria']>-1?(vals[colMap['subcategoria']]||''):'',
      nombre_producto:vals[colMap['nombre_producto']]||'',
      precio:parseFloat((vals[colMap['precio']]||'0').replace(/[^0-9.]/g,''))||0
    };
    if(row.categoria&&row.nombre_producto&&row.precio>0)rows.push(row);
  }
  if(!rows.length)return{error:'No se encontraron filas válidas.'};
  return{rows:rows};
}
// Bugfix: parser de línea CSV respetando comillas
function splitCSVLine(line,sep){
  var vals=[];var cur='';var inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'&&!inQ){inQ=true;}
    else if(c==='"'&&inQ){if(line[i+1]==='"'){cur+='"';i++;}else{inQ=false;}}
    else if(c===sep&&!inQ){vals.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  vals.push(cur.trim());
  return vals;
}
function importCSV(text,mode){
  var result=parseCSV(text);
  if(result.error){toast('❌ '+result.error,'error',4000);return;}
  var rows=result.rows;
  if(mode==='replace'){cats=[];subs=[];prods=[];}
  var newCats=0,newSubs=0,newProds=0,skipProds=0;var catColorIdx=0;
  rows.forEach(function(row){
    var cat=cats.find(function(c){return c.name.toLowerCase()===row.categoria.toLowerCase();});
    if(!cat){var color=row.color_categoria;if(!color||!color.startsWith('#')){color=COLORS[catColorIdx%COLORS.length];catColorIdx++;}cat={id:nextId(cats),name:row.categoria,color:color};cats.push(cat);newCats++;}
    var sub=null;
    if(row.subcategoria){sub=subs.find(function(s){return s.name.toLowerCase()===row.subcategoria.toLowerCase()&&s.catId===cat.id;});if(!sub){sub={id:nextId(subs),name:row.subcategoria,catId:cat.id};subs.push(sub);newSubs++;}}
    var existing=prods.find(function(p){return p.name.toLowerCase()===row.nombre_producto.toLowerCase()&&p.catId===cat.id;});
    if(existing){existing.price=row.precio;if(sub)existing.subId=sub.id;skipProds++;}
    else{prods.push({id:nextId(prods),name:row.nombre_producto,catId:cat.id,subId:sub?sub.id:0,price:row.precio});newProds++;}
  });
  save();
  toast('✅ '+newCats+' cat · '+newSubs+' sub · '+newProds+' nuevos'+(skipProds?' · '+skipProds+' act.':''),'success',3500);
  render();
}
function exportCSV(){
  var csv='categoria,color_categoria,subcategoria,nombre_producto,precio\n';
  prods.forEach(function(p){
    var cat=cats.find(function(c){return c.id===p.catId;});
    var sub=subs.find(function(s){return s.id===p.subId;});
    // Bugfix: escapar comillas en nombres de producto
    csv+='"'+(cat?cat.name.replace(/"/g,'""'):'')+'",'
        +'"'+(cat?cat.color:'')+'",'
        +(sub?'"'+sub.name.replace(/"/g,'""')+'"':'')+','

}

function downloadFile(filename,content,type){
  var blob=new Blob(['\uFEFF'+content],{type:type+';charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ============================================================
// MÓDULO: REPORTES (Mejora 8: rangos día/semana/mes)
// ============================================================
function renderReports(){
  var d=S.rptDate;var range=S.rptRange;
  // Calcular rango de fechas según pestaña
  var dateRange=[];
  var rangeLabel='';
  if(range==='week'){
    dateRange=getWeekDays(d);
    var wd0=new Date(dateRange[0]+'T12:00:00');var wdL=new Date(dateRange[6]+'T12:00:00');
    var ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    rangeLabel='Semana '+wd0.getDate()+' '+ms[wd0.getMonth()]+' — '+wdL.getDate()+' '+ms[wdL.getMonth()];
  } else if(range==='month'){
    dateRange=getMonthDays(d);
    var dm=new Date(d+'T12:00:00');
    var ms2=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    rangeLabel=ms2[dm.getMonth()]+' '+dm.getFullYear();
  } else {
    dateRange=[d];rangeLabel=dateName(d);
  }

  var rangeTxns=txns.filter(function(t){return dateRange.indexOf(t.date)>-1;});
  var dayTxns=txns.filter(function(t){return t.date===d;}); // siempre para la vista de transacciones
  var sales=rangeTxns.filter(function(t){return t.type!=='withdrawal';});
  var wds=rangeTxns.filter(function(t){return t.type==='withdrawal';});
  var totalSales=sales.reduce(function(s,t){return s+t.total;},0);
  var cashSales=sales.filter(function(t){return t.method==='cash';}).reduce(function(s,t){return s+t.total;},0);
  var cardSales=sales.filter(function(t){return t.method==='card';}).reduce(function(s,t){return s+t.total;},0);
  var mixedSales=sales.filter(function(t){return t.method==='mixed';}).reduce(function(s,t){return s+t.total;},0);
  var totalWd=wds.reduce(function(s,t){return s+t.total;},0);
  var cashInRegister=cashSales-totalWd;
  var avgTicket=sales.length?totalSales/sales.length:0;
  var itemsSold=sales.reduce(function(s,t){return s+(t.items?t.items.reduce(function(a,i){return a+i.qty;},0):0);},0);

  // Comparativas (solo para vista día)
  var yDate=dateAdd(d,-1);
  var yTotal=txns.filter(function(t){return t.date===yDate&&t.type!=='withdrawal';}).reduce(function(s,t){return s+t.total;},0);
  var yPct=pctChange(totalSales,yTotal);
  var lwDate=dateAdd(d,-7);
  var lwTotal=txns.filter(function(t){return t.date===lwDate&&t.type!=='withdrawal';}).reduce(function(s,t){return s+t.total;},0);
  var lwPct=pctChange(totalSales,lwTotal);

  // Gráfica por hora (solo día)
  var hourly={};for(var h=7;h<=22;h++)hourly[h]={total:0,count:0};
  (range==='day'?sales:sales).filter(function(t){return t.date===d;}).forEach(function(t){var hh=parseInt(t.time?t.time.split(':')[0]:'0');if(hourly[hh]!==undefined){hourly[hh].total+=t.total;hourly[hh].count++;}});
  var maxHourly=Math.max.apply(null,Object.values(hourly).map(function(h){return h.total;}).concat([1]));
  var peakHour=7;Object.entries(hourly).forEach(function(e){if(e[1].total>hourly[peakHour].total)peakHour=parseInt(e[0]);});

  // Gráfica por semana
  var weekDays=getWeekDays(d);
  var dayLabels=['L','M','X','J','V','S','D'];
  var weekData=weekDays.map(function(wd){return txns.filter(function(t){return t.date===wd&&t.type!=='withdrawal';}).reduce(function(s,t){return s+t.total;},0);});
  var maxWeek=Math.max.apply(null,weekData.concat([1]));
  var weekTotal=weekData.reduce(function(s,v){return s+v;},0);
  var prevWeekDays=weekDays.map(function(wd){return dateAdd(wd,-7);});
  var prevWeekTotal=prevWeekDays.map(function(wd){return txns.filter(function(t){return t.date===wd&&t.type!=='withdrawal';}).reduce(function(s,t){return s+t.total;},0);}).reduce(function(s,v){return s+v;},0);
  var weekPct=pctChange(weekTotal,prevWeekTotal);

  // Top productos
  var prodMap={};
  sales.forEach(function(t){if(t.items)t.items.forEach(function(i){if(!prodMap[i.name])prodMap[i.name]={name:i.name,qty:0,revenue:0};prodMap[i.name].qty+=i.qty;prodMap[i.name].revenue+=i.price*i.qty;});});
  var topProds=Object.values(prodMap).sort(function(a,b){return b.qty-a.qty;}).slice(0,5);
  var maxQty=topProds.length?topProds[0].qty:1;

  // Por categoría
  var catMap={};
  sales.forEach(function(t){if(t.items)t.items.forEach(function(i){var cn=i.catName||'Otros';if(!catMap[cn])catMap[cn]={name:cn,total:0,count:0,color:i.catColor||'#6b7280'};catMap[cn].total+=i.price*i.qty;catMap[cn].count+=i.qty;});});
  var catData=Object.values(catMap).sort(function(a,b){return b.total-a.total;});
  var maxCatTotal=catData.length?catData[0].total:1;

  // Retiros por razón
  var wdByReason={basura:0,limpieza:0,proveedor:0};
  wds.forEach(function(t){if(wdByReason[t.reason]!==undefined)wdByReason[t.reason]+=t.total;});

  var largest=sales.length?sales.reduce(function(m,t){return t.total>m.total?t:m;},sales[0]):null;
  var manTotal=sales.filter(function(t){return t.type==='manual';}).reduce(function(s,t){return s+t.total;},0);
  var prodTotal=sales.filter(function(t){return t.type==='sale';}).reduce(function(s,t){return s+t.total;},0);
  var firstTxn=dayTxns.length?dayTxns[0]:null;
  var lastTxn=dayTxns.length?dayTxns[dayTxns.length-1]:null;
  var cashPct=totalSales?Math.round(cashSales/totalSales*100):0;
  var cardPct=totalSales?Math.round(cardSales/totalSales*100):0;
  var mixedPct=totalSales?100-cashPct-cardPct:0;

  // Resumen de rango (semana/mes)
  var rangeSummaryHtml='';
  if(range!=='day'){
    var labels=range==='week'?dayLabels:null;
    rangeSummaryHtml='<div class="rpt-range-summary"><div class="rs-title">'+(range==='week'?'📊 Desglose semanal':'📅 Desglose mensual')+'</div><div class="rs-grid">'+
      dateRange.map(function(dd,i){
        var dv=txns.filter(function(t){return t.date===dd&&t.type!=='withdrawal';}).reduce(function(s,t){return s+t.total;},0);
        var ddObj=new Date(dd+'T12:00:00');
        var lbl=range==='week'?(dayLabels[i]+' '+ddObj.getDate()):(String(ddObj.getDate()));
        return '<div class="rs-item'+(dd===todayStr()?' rs-today':'')+'"><div class="rs-day">'+lbl+'</div><div class="rs-val">'+(dv>0?'$'+Math.round(dv):'—')+'</div></div>';
      }).join('')+
    '</div></div>';
  }

  // Navegación: en semana avanza 7 días, en mes avanza 1 mes
  var prevDate=range==='week'?dateAdd(d,-7):range==='month'?dateAdd(d,-30):dateAdd(d,-1);
  var nextDate=range==='week'?dateAdd(d,7):range==='month'?dateAdd(d,30):dateAdd(d,1);

  return '<div class="rpt-view">'+
    '<div class="rpt-header">'+
      '<div class="rpt-nav">'+
        '<button data-action="rpt-prev" data-prev="'+prevDate+'">◀</button>'+

      '</div>'+
      '<button class="rpt-today" data-action="rpt-today">Hoy</button>'+
      '<div class="rpt-range-tabs">'+
        ['day','week','month'].map(function(r){return '<button class="rpt-range-tab'+(range===r?' active':'')+'" data-action="rpt-range" data-value="'+r+'">'+(r==='day'?'Día':r==='week'?'Semana':'Mes')+'</button>';}).join('')+
      '</div>'+
    '</div>'+
    '<div class="rpt-body">'+
      rangeSummaryHtml+
      '<div class="rpt-cards">'+
        '<div class="rpt-card" style="border-color:#6366f1"><div class="rc-icon">💰</div><div class="rc-label">Ventas</div><div class="rc-value">'+fmt(totalSales)+'</div><div class="rc-sub">'+sales.length+' ops</div></div>'+
        '<div class="rpt-card" style="border-color:#10b981"><div class="rc-icon">💵</div><div class="rc-label">Efectivo</div><div class="rc-value">'+fmt(cashSales)+'</div><div class="rc-sub">'+cashPct+'%</div></div>'+
        '<div class="rpt-card" style="border-color:#3b82f6"><div class="rc-icon">💳</div><div class="rc-label">Tarjeta</div><div class="rc-value">'+fmt(cardSales)+'</div><div class="rc-sub">'+cardPct+'%</div></div>'+
        '<div class="rpt-card" style="border-color:#f59e0b"><div class="rc-icon">📤</div><div class="rc-label">Retiros</div><div class="rc-value">'+fmt(totalWd)+'</div><div class="rc-sub">'+wds.length+' ret</div></div>'+
        '<div class="rpt-card" style="border-color:#8b5cf6"><div class="rc-icon">🏦</div><div class="rc-label">En Caja</div><div class="rc-value">'+fmt(cashInRegister)+'</div><div class="rc-sub">Neto</div></div>'+
      '</div>'+
      '<div class="rpt-kpis">'+
        '<div class="rpt-kpi"><div class="kpi-label">🎫 Ticket Prom</div><div class="kpi-value">'+fmt(avgTicket)+'</div><div class="kpi-sub">'+itemsSold+' arts</div></div>'+
        '<div class="rpt-kpi"><div class="kpi-label">📅 vs Ayer</div><div class="kpi-value">'+fmt(yTotal)+'</div><div class="kpi-sub">'+pctLabel(yPct)+'</div></div>'+
        '<div class="rpt-kpi"><div class="kpi-label">📆 vs Sem Pasada</div><div class="kpi-value">'+fmt(lwTotal)+'</div><div class="kpi-sub">'+pctLabel(lwPct)+'</div></div>'+
        '<div class="rpt-kpi"><div class="kpi-label">⭐ Mayor Venta</div><div class="kpi-value">'+(largest?fmt(largest.total):'—')+'</div><div class="kpi-sub">'+(largest?largest.time:'—')+'</div></div>'+
      '</div>'+
      '<div class="rpt-charts">'+
        '<div class="chart-box">'+
          '<div class="chart-title">⏰ Por Hora <span class="chart-badge">🔥 '+peakHour+'h</span></div>'+
          '<div class="chart-bars">'+Object.entries(hourly).map(function(e){
            var pct=maxHourly?e[1].total/maxHourly*100:0;
            return '<div class="chart-bar-col"><div class="chart-bar '+(parseInt(e[0])===peakHour?'peak':'')+'" style="height:'+Math.max(pct,2)+'%">'+(e[1].total>0?'<span class="chart-bar-val">'+Math.round(e[1].total)+'</span>':'')+'</div><div class="chart-bar-label">'+e[0]+'</div></div>';
          }).join('')+'</div>'+
        '</div>'+
        '<div class="chart-box">'+
          '<div class="chart-title">📊 Semana <span class="chart-badge">'+fmt(weekTotal)+' '+pctLabel(weekPct)+'</span></div>'+
          '<div class="chart-bars">'+weekData.map(function(v,i){
            var pct=maxWeek?v/maxWeek*100:0;var isToday=weekDays[i]===d;
            return '<div class="chart-bar-col"><div class="chart-bar '+(isToday?'today-bar':'')+'" style="height:'+Math.max(pct,2)+'%">'+(v>0?'<span class="chart-bar-val">'+Math.round(v)+'</span>':'')+'</div><div class="chart-bar-label" style="'+(isToday?'font-weight:800;color:#f59e0b':'')+'">'+dayLabels[i]+'</div></div>';
          }).join('')+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="rpt-insights">'+
        '<div class="insight-box">'+
          '<div class="insight-title">🏆 Top Productos</div>'+
          (topProds.length?topProds.map(function(p,i){
            var colors=['#f59e0b','#94a3b8','#b45309','#6366f1','#64748b'];
            return '<div class="top-prod"><div class="rank" style="background:'+colors[i]+'">'+(i+1)+'</div><div class="tp-name">'+p.name+'</div><div class="tp-qty">'+p.qty+'u</div><div class="tp-rev">'+fmt(p.revenue)+'</div></div><div class="progress-bar"><div class="progress-fill" style="width:'+p.qty/maxQty*100+'%;background:'+colors[i]+'"></div></div>';
          }).join(''):'<div class="empty-state"><span class="es-text">Sin datos</span></div>')+
        '</div>'+
        '<div class="insight-box">'+
          '<div class="insight-title">📁 Por Categoría</div>'+
          (catData.length?catData.map(function(c){return '<div class="cat-row"><div class="cr-dot" style="background:'+c.color+'"></div><div class="cr-name">'+c.name+'</div><div class="cr-total">'+fmt(c.total)+'</div></div><div class="progress-bar"><div class="progress-fill" style="width:'+c.total/maxCatTotal*100+'%;background:'+c.color+'"></div></div>';}).join(''):'<div class="empty-state"><span class="es-text">Sin datos</span></div>')+
        '</div>'+
        '<div class="insight-box">'+
          '<div class="insight-title">📋 Extra</div>'+
          '<div class="extra-card"><div class="ec-label">Tipo</div><div style="display:flex;gap:6px;font-size:11px;margin-top:2px"><span>📦 '+fmt(prodTotal)+'</span><span>✏️ '+fmt(manTotal)+'</span></div></div>'+
          '<div class="extra-card"><div class="ec-label">Retiros</div><div style="font-size:10px;margin-top:2px">🗑️ '+fmt(wdByReason.basura)+' · 🧹 '+fmt(wdByReason.limpieza)+' · 🚛 '+fmt(wdByReason.proveedor)+'</div></div>'+
          '<div class="extra-card"><div class="ec-label">Pago</div>'+
            '<div class="donut-wrap">'+
              '<svg width="50" height="50" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.9" fill="none" stroke="#e2e8f0" stroke-width="3"/>'+
              (totalSales>0?
                '<circle cx="18" cy="18" r="15.9" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="'+cashPct+' '+(100-cashPct)+'" stroke-dashoffset="25"/>'+
                '<circle cx="18" cy="18" r="15.9" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="'+cardPct+' '+(100-cardPct)+'" stroke-dashoffset="'+(25-cashPct)+'"/>'+
                (mixedPct>0?'<circle cx="18" cy="18" r="15.9" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="'+mixedPct+' '+(100-mixedPct)+'" stroke-dashoffset="'+(25-cashPct-cardPct)+'"/>':''):'')+
              '</svg>'+
              '<div class="donut-legend">'+
                '<div class="dl-item"><div class="dl-dot" style="background:#10b981"></div>'+cashPct+'% Ef</div>'+
                '<div class="dl-item"><div class="dl-dot" style="background:#3b82f6"></div>'+cardPct+'% Tj</div>'+
                (mixedPct>0?'<div class="dl-item"><div class="dl-dot" style="background:#8b5cf6"></div>'+mixedPct+'% Mx</div>':'')+
              '</div>'+
            '</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="rpt-txns">'+
        '<div class="txn-title">📝 Transacciones '+(range!=='day'?'(día selec.)':'')+' <span style="font-size:10px;color:#94a3b8;font-weight:500">'+(firstTxn?firstTxn.time+' — '+(lastTxn?lastTxn.time:''):'')+' · '+dayTxns.length+' reg</span></div>'+
        '<div class="txn-list">'+(dayTxns.length?dayTxns.map(function(t){
          var isWd=t.type==='withdrawal';
          var methodClass=isWd?'wd':t.method;
          var methodLabel=isWd?'Retiro':t.method==='cash'?'Efvo':t.method==='card'?'Tarj':'Mixto';
          var desc=isWd?('Retiro: '+t.reason):(t.type==='sale'?(t.items?t.items.map(function(i){return i.name+'×'+i.qty;}).join(', '):'Venta'):'Manual'+(t.description?' - '+t.description:''));
          return '<div class="txn-item"><div class="txn-time">'+(t.time||'')+'</div><div class="txn-type">'+desc+'</div><span class="txn-method '+methodClass+'">'+methodLabel+'</span><div class="txn-total" style="color:'+(isWd?'#ef4444':'#1e293b')+'">'+(isWd?'-':'')+fmt(t.total)+'</div></div>';
        }).join(''):'<div class="empty-state"><span class="es-icon">📝</span><span class="es-text">Sin transacciones</span></div>')+'</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function afterRender(){
  var catSel=document.getElementById('db-cat-sel');
  if(catSel)catSel.addEventListener('change',function(){S.dbFormCatId=this.value;S.dbFormSubId='';renderNow();});
  var subSel=document.getElementById('db-sub-sel');
  if(subSel)subSel.addEventListener('change',function(){S.dbFormSubId=this.value;});
  var discInput=document.getElementById('disc-input');
  if(discInput){discInput.addEventListener('input',function(){S.discountValue=this.value;});discInput.focus();}
  var mxCash=document.getElementById('mixed-cash-input');
  if(mxCash)mxCash.addEventListener('input',function(){S.mixedCash=this.value;updateMixedSummary();});
  var mxCard=document.getElementById('mixed-card-input');
  if(mxCard)mxCard.addEventListener('input',function(){S.mixedCard=this.value;updateMixedSummary();});
}

function updateMixedSummary(){
  var mc=parseFloat(S.mixedCash)||0;var mcc=parseFloat(S.mixedCard)||0;
  var total=getCartTotal();var mSum=mc+mcc;var mOk=mSum>=total&&mSum>0;
  var sumEl=document.querySelector('.mixed-summary');
  if(sumEl){sumEl.innerHTML='<span>Total ingresado: '+fmt(mSum)+'</span><span class="'+(mOk?'ms-ok':'ms-err')+'">'+(mOk?'✅ OK':mSum>total?'⚠️ Excede '+fmt(mSum-total):'Faltan '+fmt(total-mSum))+'</span>';}
  var btn=document.querySelector('[data-action="confirm-pay"]');
  if(btn)btn.disabled=!mOk;
}

document.addEventListener('click',function(e){
  var btn=e.target.closest('[data-action]');
  if(!btn)return;
  preserveInputs();
  var action=btn.dataset.action;
  var value=btn.dataset.value;
  var id=btn.dataset.id?parseInt(btn.dataset.id):null;
  var target=btn.dataset.target;

  switch(action){
    case 'nav':
      S.view=value;
      if(value==='manual'){S.manMode='input';S.manStep=1;S.manNumpad='';S.manPaid='';S.manDesc='';S.manMethod='cash';}
      if(value==='withdrawal'){S.wdMode='input';S.wdNumpad='';}
      renderNow();break;
    case 'sel-cat':S.selCat=value==='all'?'all':parseInt(value);renderNow();break;

    // Bugfix #1: variables scoped correctamente fuera del switch
    case 'add-cart':{
      var prodId=parseInt(btn.dataset.id);
      var prod=prods.find(function(p){return p.id===prodId;});
      if(!prod)break;
      var cartItem=S.cart.find(function(c){return c.prodId===prod.id;});
      var cat=cats.find(function(c){return c.id===prod.catId;});
      var sub=subs.find(function(ss){return ss.id===prod.subId;});
      if(cartItem){cartItem.qty++;}
      else{S.cart.push({prodId:prod.id,name:prod.name,price:prod.price,qty:1,catName:cat?cat.name:'',catColor:cat?cat.color:'#6b7280',subName:sub?sub.name:''});}
      // Mejora 14: animación badge sin re-render completo
      var badge=document.getElementById('badge-'+prodId);
      if(badge){
        badge.textContent=(cartItem?cartItem.qty:1);
        badge.classList.remove('bump');
        void badge.offsetWidth; // reflow para reiniciar animación
        badge.classList.add('bump');
        setTimeout(function(){render();},200); // re-render diferido
      } else {
        renderNow();
      }
      break;
    }
    case 'cart-plus':{
      var plusItem=S.cart.find(function(c){return c.prodId===id;});
      if(plusItem)plusItem.qty++;
      renderNow();break;
    }
    case 'cart-minus':{
      var minusIdx=S.cart.findIndex(function(c){return c.prodId===id;});
      if(minusIdx>-1){S.cart[minusIdx].qty--;if(S.cart[minusIdx].qty<=0)S.cart.splice(minusIdx,1);}
      renderNow();break;
    }
    case 'cart-del':{S.cart=S.cart.filter(function(c){return c.prodId!==id;});renderNow();break;}
    case 'clear-cart':S.cart=[];S.discountType='none';S.discountValue='';renderNow();break;

    // Mejora 2: descuentos
    case 'disc-type':
      S.discountType=value;
      if(value==='none')S.discountValue='';
      renderNow();break;

    case 'go-pay':
      if(S.cart.length){S.tpvMode='pay';S.numpad='';S.payMethod='cash';S.mixedCash='';S.mixedCard='';renderNow();}
      break;
    case 'pay-method':S.payMethod=value;S.numpad='';S.mixedCash='';S.mixedCard='';renderNow();break;
    case 'quick-amt':S.numpad=String(parseFloat(value));updatePayPreview();renderNow();break;
    case 'cancel-pay':S.tpvMode='browse';renderNow();break;

    case 'confirm-pay':{
      var total=getCartTotal();
      var paid,change,method;
      if(S.payMethod==='cash'){
        paid=parseFloat(S.numpad)||0;
        if(paid<total)break;
        change=Math.round((paid-total)*100)/100;
        method='cash';
      } else if(S.payMethod==='card'){
        paid=total;change=0;method='card';
      } else {
        // Mixto
        var mc2=parseFloat(S.mixedCash)||0;var mcc2=parseFloat(S.mixedCard)||0;
        if(mc2+mcc2<total)break;
        paid=mc2+mcc2;change=Math.round((paid-total)*100)/100;method='mixed';
      }
      var disc=getDiscount();
      // Bugfix #3: snapshot antes de limpiar carrito
      S.confirmedTotal=total;S.confirmedPaid=paid;S.confirmedChange=change;S.confirmedMethod=method;
      txns.push({id:Date.now(),date:todayStr(),time:timeStr(),type:'sale',
        items:S.cart.map(function(i){return{prodId:i.prodId,name:i.name,price:i.price,qty:i.qty,catName:i.catName,catColor:i.catColor};}),
        total:total,method:method,paid:paid,change:change,discount:disc,
        cashPart:method==='mixed'?(parseFloat(S.mixedCash)||0):undefined,
        cardPart:method==='mixed'?(parseFloat(S.mixedCard)||0):undefined
      });
      save();
      S.discountType='none';S.discountValue='';
      S.tpvMode=method==='cash'?'change':'success';
      toast('✅ Venta registrada · '+fmt(total),'success');
      renderNow();break;
    }
    case 'new-sale':S.cart=[];S.tpvMode='browse';S.numpad='';renderNow();break;

    case 'man-go-cash':{
      var amt1=parseFloat(S.manNumpad)||0;if(amt1<=0)break;
      S.manMethod='cash';S.manStep=2;S.manPaid='';renderNow();break;
    }
    case 'man-go-card':{
      var amt2=parseFloat(S.manNumpad)||0;if(amt2<=0)break;
      S.manMethod='card';
      txns.push({id:Date.now(),date:todayStr(),time:timeStr(),type:'manual',items:[],total:amt2,method:'card',paid:amt2,change:0,description:S.manDesc});
      save();S.manMode='success';toast('✅ Cobro registrado · '+fmt(amt2),'success');renderNow();break;
    }
    case 'man-back':S.manStep=1;S.manPaid='';renderNow();break;
    case 'man-quick':S.manPaid=String(parseFloat(value));updatePayPreview();renderNow();break;
    case 'man-confirm-cash':{
      var manTot=parseFloat(S.manNumpad)||0;var manPd=parseFloat(S.manPaid)||0;
      if(manTot<=0||manPd<manTot)break;
      txns.push({id:Date.now(),date:todayStr(),time:timeStr(),type:'manual',items:[],total:manTot,method:'cash',paid:manPd,change:Math.round((manPd-manTot)*100)/100,description:S.manDesc});
      save();S.manMode='change';toast('✅ Cobro registrado · '+fmt(manTot),'success');renderNow();break;
    }
    case 'man-new':S.manMode='input';S.manStep=1;S.manNumpad='';S.manPaid='';S.manDesc='';renderNow();break;

    case 'wd-reason':S.wdReason=value;renderNow();break;
    case 'wd-confirm':{
      var wdAmt=parseFloat(S.wdNumpad)||0;if(wdAmt<=0)break;
      txns.push({id:Date.now(),date:todayStr(),time:timeStr(),type:'withdrawal',items:[],total:wdAmt,method:'cash',paid:0,change:0,reason:S.wdReason});
      save();S.wdMode='success';toast('💸 Retiro registrado · '+fmt(wdAmt),'warning');renderNow();break;
    }
    case 'wd-new':S.wdMode='input';S.wdNumpad='';renderNow();break;

    case 'numpad':numpadPress(target,value);break;

    case 'db-tab':S.dbTab=value;S.dbEditing=null;S.dbFormName='';S.dbFormColor='#ef4444';S.dbFormCatId=cats.length?String(cats[0].id):'';S.dbFormSubId='';S.dbPriceNumpad='';renderNow();break;
    case 'db-color':S.dbFormColor=value;renderNow();break;
    case 'db-cancel':S.dbEditing=null;S.dbFormName='';S.dbFormColor='#ef4444';S.dbFormCatId=cats.length?String(cats[0].id):'';S.dbFormSubId='';S.dbPriceNumpad='';renderNow();break;
    case 'db-save-cat':{
      var cname=(document.getElementById('db-name')||{}).value||'';if(!cname.trim())break;
      if(S.dbEditing){var ec=cats.find(function(x){return x.id===S.dbEditing;});if(ec){ec.name=cname.trim();ec.color=S.dbFormColor;}}
      else{cats.push({id:nextId(cats),name:cname.trim(),color:S.dbFormColor});}
      save();S.dbEditing=null;S.dbFormName='';toast('📁 Categoría guardada','info');renderNow();break;
    }
    case 'db-edit-cat':{var ec2=cats.find(function(x){return x.id===id;});if(ec2){S.dbEditing=ec2.id;S.dbFormName=ec2.name;S.dbFormColor=ec2.color;}renderNow();break;}
    case 'db-del-cat':{if(!confirm('¿Eliminar categoría y sus productos?'))break;cats=cats.filter(function(c){return c.id!==id;});subs=subs.filter(function(s){return s.catId!==id;});prods=prods.filter(function(p){return p.catId!==id;});save();toast('🗑️ Categoría eliminada','warning');renderNow();break;}
    case 'db-save-sub':{
      var sname=(document.getElementById('db-name')||{}).value||'';
      var scatId=parseInt((document.getElementById('db-cat-sel')||{}).value)||0;
      if(!sname.trim()||!scatId)break;
      if(S.dbEditing){var es=subs.find(function(x){return x.id===S.dbEditing;});if(es){es.name=sname.trim();es.catId=scatId;}}
      else{subs.push({id:nextId(subs),name:sname.trim(),catId:scatId});}
      save();S.dbEditing=null;S.dbFormName='';toast('📂 Subcategoría guardada','info');renderNow();break;
    }
    case 'db-edit-sub':{var esb=subs.find(function(x){return x.id===id;});if(esb){S.dbEditing=esb.id;S.dbFormName=esb.name;S.dbFormCatId=String(esb.catId);}renderNow();break;}
    case 'db-del-sub':{subs=subs.filter(function(s){return s.id!==id;});prods.forEach(function(p){if(p.subId===id)p.subId=0;});save();toast('🗑️ Subcategoría eliminada','warning');renderNow();break;}
    case 'db-save-prod':{
      var pname=(document.getElementById('db-name')||{}).value||'';
      var pCatId=parseInt((document.getElementById('db-cat-sel')||{}).value)||0;
      var pSubId=parseInt((document.getElementById('db-sub-sel')||{}).value)||0;
      var price=parseFloat(S.dbPriceNumpad)||0;
      if(!pname.trim()||!pCatId||price<=0)break;
      if(S.dbEditing){var ep=prods.find(function(x){return x.id===S.dbEditing;});if(ep){ep.name=pname.trim();ep.catId=pCatId;ep.subId=pSubId;ep.price=price;}}
      else{prods.push({id:nextId(prods),name:pname.trim(),catId:pCatId,subId:pSubId,price:price});}
      save();S.dbEditing=null;S.dbFormName='';S.dbPriceNumpad='';toast('📦 Producto guardado','info');renderNow();break;
    }
    case 'db-edit-prod':{var epr=prods.find(function(x){return x.id===id;});if(epr){S.dbEditing=epr.id;S.dbFormName=epr.name;S.dbFormCatId=String(epr.catId);S.dbFormSubId=String(epr.subId||'');S.dbPriceNumpad=String(epr.price);}renderNow();break;}
    case 'db-del-prod':{prods=prods.filter(function(p){return p.id!==id;});S.cart=S.cart.filter(function(c){return prods.find(function(p){return p.id===c.prodId;});});save();toast('🗑️ Producto eliminado','warning');renderNow();break;}

    case 'csv-import-add':case 'csv-import-replace':{
      var mode=action==='csv-import-replace'?'replace':'add';
      var fi=document.getElementById('csv-file-input');fi.dataset.mode=mode;fi.value='';fi.click();break;
    }
    case 'csv-export':exportCSV();break;
    case 'csv-export-txns':exportTransactions();break;
    case 'csv-template':exportTemplate();break;
    case 'csv-clear-all':clearAllData();break;

    case 'rpt-prev':S.rptDate=btn.dataset.prev||dateAdd(S.rptDate,-1);renderNow();break;
    case 'rpt-next':S.rptDate=btn.dataset.next||dateAdd(S.rptDate,1);renderNow();break;
    case 'rpt-today':S.rptDate=todayStr();renderNow();break;
    case 'rpt-range':S.rptRange=value;renderNow();break;

    case 'dismiss-day-banner':showDayChangeBanner=false;renderNow();break;
  }
});

document.getElementById('csv-file-input').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var mode=this.dataset.mode||'add';
  var reader=new FileReader();
  reader.onload=function(ev){importCSV(ev.target.result,mode);};
  reader.readAsText(file,'UTF-8');
});

// Prevenir zoom en móvil
document.addEventListener('gesturestart',function(e){e.preventDefault();},{passive:false});
document.addEventListener('gesturechange',function(e){e.preventDefault();},{passive:false});
document.addEventListener('gestureend',function(e){e.preventDefault();},{passive:false});
var lastTouchEnd=0;
document.addEventListener('touchend',function(e){
  var now=Date.now();if(now-lastTouchEnd<=300){e.preventDefault();}lastTouchEnd=now;
},{passive:false});

// ============================================================
// MÓDULO: RELOJ (no re-renderiza el app completo)
// ============================================================
function updateClock(){
  var now=new Date();
  var t=document.getElementById('sidebar-clock-time');
  var d=document.getElementById('sidebar-clock-date');
  if(t)t.textContent=pad(now.getHours())+':'+pad(now.getMinutes());
  if(d){var ds=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];var ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];d.textContent=ds[now.getDay()]+' '+now.getDate()+' '+ms[now.getMonth()];}
}

function checkDayChange(){
  var nd=todayStr();
  if(currentDay&&nd!==currentDay){
    currentDay=nd;
    if(S.rptDate===dateAdd(nd,-1))S.rptDate=nd;
    showDayChangeBanner=true;
    // Mejora 20: purgar transacciones al cambio de día
    pruneOldTxns();save();
    renderNow();
  }
}

setInterval(updateClock,1000);
setInterval(checkDayChange,10000);

// ============================================================
// INIT
// ============================================================
load();
pruneOldTxns(); // Mejora 20: purgar al arrancar
if(!cats.length)seed();
currentDay=todayStr();
if(!S.dbFormCatId&&cats.length)S.dbFormCatId=String(cats[0].id);
renderNow();
</script>
</body>
